<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container" style="max-width: 400px; margin-top: 100px;">
    <h1 style="text-align: center;">Acceso al Sistema</h1>

    <section class="card" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
      <form id="formLogin">
        <div class="grupo" style="margin-bottom: 15px;">
          <label for="usuario" style="display: block; margin-bottom: 5px; font-weight: bold;">Usuario</label>
          <input type="text" id="usuario" required placeholder="Ej: felipe" style="width: 100%; padding: 10px; box-sizing: border-box;">
        </div>

        <div class="grupo" style="margin-bottom: 20px;">
          <label for="contrasena" style="display: block; margin-bottom: 5px; font-weight: bold;">Contraseña</label>
          <input type="password" id="contrasena" required placeholder="••••••••" style="width: 100%; padding: 10px; box-sizing: border-box;">
        </div>

        <button type="submit" style="width: 100%; padding: 10px; background: #0275d8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
          Ingresar
        </button>
      </form>

      <div id="mensaje" style="margin-top: 15px; text-align: center; font-weight: bold;"></div>
      
      <div style="text-align: center; margin-top: 15px;">
        <a href="index.html" style="color: #666; text-decoration: none; font-size: 14px;">← Volver </a>
      </div>
    </section>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
